server:
  port: 8080

spring:
  application:
    name: segmentation-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:segmentation;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8000}
